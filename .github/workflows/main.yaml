name: main
on:
  pull_request:
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress runs for the workflow for pull requests.
  # For pushes to main, in-progress runs should NOT be cancelled since pushing container images should not be cancelled.
  cancel-in-progress: ${{ github.event_name != 'push' && github.ref_name != 'main' }}

jobs:
  prepare_matrix:
    runs-on: ubuntu-slim
    outputs:
      jobs: ${{ steps.prepare-matrix.outputs.jobs }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Build targets are defined in .github/build-targets.yaml and filtered to
      # the images whose files changed in the PR by the generate_matrix script.
      - id: prepare-matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            export PR=$(jq -r '.pull_request.number' "${GITHUB_EVENT_PATH}")
          else
            export PR=$(gh pr list --state merged --json number,mergeCommit | jq ".[] | select(.mergeCommit != null and .mergeCommit.oid == \"${GITHUB_SHA}\") | .number")
          fi
          ./generate_matrix
          echo "jobs=$(cat .github/outputs/__matrix.json)" >> "$GITHUB_OUTPUT"

  build_container:
    needs: prepare_matrix
    strategy:
      matrix:
        job: ${{ fromJson(needs.prepare_matrix.outputs.jobs) }}
    runs-on: ${{ matrix.job.runner || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: write
    env:
      go-version: "1.26.3"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup build environment
        uses: ./.github/actions/setup
        with:
          # A matrix entry may override the Go version via the "go-version" field.
          go-version: ${{ matrix.job.go-version || env.go-version }}
      - name: Disk cleanup
        run: |
          # These code are copied from the following code:
          # https://github.com/shiguredo-webrtc-build/webrtc-build/blob/5a821e430b496bbff74cf45bab058ab4ac340c2c/.github/workflows/build.yml#L138-L147
          #    LICENSE: http://www.apache.org/licenses/LICENSE-2.0
          #    Copyright 2019-2025, Shiguredo Inc.
          df -h
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          df -h
      - name: Build container image
        uses: ./.github/actions/build_push
        with:
          push: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          dir: ${{ matrix.job.dir }}
          tags: ${{ join(matrix.job.tags, ',') }}
          platforms: ${{ matrix.job.platforms }}
          load: ${{ matrix.job.load }}
          make-targets: ${{ matrix.job.make-targets }}
          make-post-targets: ${{ matrix.job.make-post-targets }}
          target: ${{ matrix.job.target }}

  build_envoy:
    runs-on: neco-containers-ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build container image
        uses: ./.github/actions/build_envoy
        with:
          push: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          clang_archive_path: https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz
          clang_archive_sha: 54ec30358afcc9fb8aa74307db3046f5187f9fb89fb37064cdde906e062ebf36
          envoy_commit_sha: f2a676793ef8c5ea9d1df9e1e806826c8f1fd51e

  build_ceph:
    runs-on: neco-containers-ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Build ceph image
      uses: ./.github/actions/build_ceph
      with:
        push: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
