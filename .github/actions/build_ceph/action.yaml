name: "Build ceph"
description: "Build ceph"
inputs:
  push:
    description: >-
      whether to push the built image (caller-controlled; 'true' to push).
      Note that the image will NOT be pushed if the tag has already existed
      on the registry, even if this field is set to 'true'.
    required: true
runs:
  using: composite
  steps:
    - name: Prepare
      shell: bash
      id: prepare
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PLAN=$(./build_decision ".github/actions/build_ceph/target.yaml" "ceph" "ceph")
        echo "plan=${PLAN}" >> "$GITHUB_OUTPUT"
    - name: Setup build environment
      uses: ./.github/actions/setup
      with:
        platforms: ${{ fromJSON(steps.prepare.outputs.plan).platforms }}
    - name: Build
      if: fromJSON(steps.prepare.outputs.plan).build
      shell: bash
      run: |
        TAG_CONTENT=$(cat TAG)
        if ! echo "${TAG_CONTENT}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Invalid TAG file format: ${TAG_CONTENT}"
          exit 1
        fi
        VERSION=$(echo "${TAG_CONTENT}" | cut -d '.' -f1-3)
        sudo ./build.sh ${VERSION}
        sudo mv src/workspace .
      working-directory: ${{ fromJSON(steps.prepare.outputs.plan).dir }}
    - name: Build and push
      if: fromJSON(steps.prepare.outputs.plan).build
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ fromJSON(steps.prepare.outputs.plan).dir }}
        platforms: ${{ fromJSON(steps.prepare.outputs.plan).platforms }}
        push: ${{ inputs.push == 'true' }}
        tags: ${{ join(fromJSON(steps.prepare.outputs.plan).tags, ',') }}
