name: "Build and push"
description: "build and push container image"

# The build matrix only contains buildable entries (the generate_matrix script
# already decided there is a new tag to build), so the build/test steps always
# run. Whether to PUSH is decided by the caller and passed via the `push` input
# (e.g. callers set it false for pull requests); this action does not inspect
# the workflow event itself.

inputs:
  dir:
    description: "build context directory"
    required: true
  tags:
    description: >-
      comma-separated tags passed to docker/build-push-action. The first tag is
      the primary version tag and is exposed to make post-targets as IMAGE_TAG.
    required: true
  push:
    description: >-
      whether to push the built image (caller-controlled; 'true' to push).
    required: true
  platforms:
    description: "Target platforms"
    required: true
  load:
    description: "Load built image to local docker daemon"
    required: true
  make-targets:
    description: "make targets before building docker image"
    required: true
  make-post-targets:
    description: "make targets run after docker build"
    required: true
  target:
    description: "Target stage to build"
    required: true

runs:
  using: "composite"
  steps:
    - name: Make pre-targets
      if: ${{ inputs.make-targets != '' }}
      shell: bash
      run: |
        for i in ${{ inputs.make-targets }}; do
          echo "Executing make $i..."
          make -C ${{ inputs.dir }} $i
        done

    - name: Build
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ inputs.dir }}
        platforms: ${{ inputs.platforms }}
        load: ${{ inputs.load }}
        push: false
        tags: ${{ inputs.tags }}
        target: ${{ inputs.target }}

    - name: Make post-targets
      if: ${{ inputs.make-post-targets != '' }}
      shell: bash
      run: |
        # The first tag is the primary version tag (see tags_gen).
        IMAGE_TAG="${{ inputs.tags }}"
        IMAGE_TAG="${IMAGE_TAG%%,*}"
        export IMAGE_TAG
        for i in ${{ inputs.make-post-targets }}; do
          echo "Executing make $i (IMAGE_TAG=${IMAGE_TAG})..."
          make -C ${{ inputs.dir }} $i
        done

    - name: Push
      if: ${{ inputs.push == 'true' }}
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ inputs.dir }}
        platforms: ${{ inputs.platforms }}
        push: true
        tags: ${{ inputs.tags }}
        target: ${{ inputs.target }}
