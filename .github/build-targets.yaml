# Build targets for the "main" workflow.
#
# Each entry defines one container image build job. The list is consumed by
# the generate_matrix script, which filters it down to images whose files
# changed in the PR, then dispatches each entry to the build_container job.
#
# Fields:
#   dir              : REQUIRED. build context directory
#   container-image  : REQUIRED. image name (pushed to ghcr.io/cybozu/<name>)
#   scan.enabled     : REQUIRED. true / false
#   scan.team        : REQUIRED if scan.enabled is true. Yamory team name for the image
#   scan.identifier  : Yamory image identifier (e.g., ghcr.io/cybozu/golang:1.25-noble) (default: ghcr.io/cybozu/<container-image>)
#   scan.is_public   : true / false. Whether the image is used in public accessible environment (default: false)
#   platforms        : build platforms (default: linux/amd64)
#   load             : load image into local docker daemon (default: false)
#   target           : Dockerfile target stage
#   make-targets     : make targets run before docker build
#   make-post-targets: make targets run after docker build
#   runner           : runs-on label (default: ubuntu-24.04)
#   go-version       : Go toolchain version (default: build_container job default)
#   disk-cleanup     : perform disk cleanup before build (default: false)

