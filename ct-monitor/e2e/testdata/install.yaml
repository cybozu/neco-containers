apiVersion: v1
kind: ServiceAccount
metadata:
  name: ct-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ct-monitor
rules:
- apiGroups: ["cert-manager.io"]
  resources: ["certificaterequests"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ct-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ct-monitor
subjects:
- kind: ServiceAccount
  name: ct-monitor
  namespace: default
---
apiVersion: v1
data:
  config.toml: |
    [[domain]]
      name = "stage1.cybozu-ne.co"
      include_subdomains = true
      match_wildcards = true
    [alert_config]
      mailer_config = "noop"
    [filter_config]
      filters = ["/plugins/incluster-filter"]
kind: ConfigMap
metadata:
  name: ct-monitor-config
---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/name: ct-monitor
  name: ct-monitor
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ct-monitor
        spec:
          serviceAccountName: ct-monitor
          containers:
          - image: ghcr.io/cybozu/ct-monitor:dev
            imagePullPolicy: Never
            name: ct-monitor
            env:
            - name: INCLUSTER_FILTER_LOG_LEVEL
              value: debug
            volumeMounts:
            - mountPath: /etc/ct-monitor/config.toml
              name: config-volume
              subPath: config.toml
            - mountPath: /var/log/ct-monitor
              name: positions-volume
          restartPolicy: OnFailure
          volumes:
          - name: positions-volume
            persistentVolumeClaim:
              claimName: ct-monitor-position
          - configMap:
              name: ct-monitor-config
            name: config-volume
  schedule: '*/60 * 29 2 *'
  startingDeadlineSeconds: 60
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ct-monitor-position
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Mi
